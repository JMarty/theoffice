<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Office — Mission Control</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <h1>The Office <span class="sub">mission control</span></h1>
      <div id="tokrow" class="tokrow">
        <input id="token" type="password" placeholder="dashboard API token" />
        <button id="save">Connect</button>
        <span id="conn" class="muted"></span>
      </div>
    </header>

    <main>
      <section id="overview" class="cards"></section>

      <nav class="tabs">
        <button data-tab="agents" class="active">Agents</button>
        <button data-tab="memories">Memory</button>
        <button data-tab="kanban">Kanban</button>
        <button data-tab="schedules">Schedules</button>
        <button data-tab="queue">Queue</button>
        <button data-tab="messages">Messages</button>
        <button data-tab="usage">Usage</button>
        <button data-tab="logs">Logs</button>
      </nav>

      <section id="panel"></section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
