<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Office — Mission Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- Token gate (shown until a valid token connects) -->
    <div id="gate">
      <div class="brand-lg">The Office</div>
      <span class="ml">Mission Control</span>
      <input id="token" type="password" placeholder="dashboard token" autocomplete="off" />
      <button id="save">Connect</button>
      <div class="err" id="gate-err"></div>
    </div>

    <!-- App shell (built by app.js) -->
    <div id="app" class="hidden">
      <header><div class="hwrap" id="hwrap"></div></header>
      <main class="page">
        <div class="strip" id="strip"></div>
        <nav class="tabs" id="tabs"></nav>
        <div id="panel"></div>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
