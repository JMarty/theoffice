name: CI

# Quality gate: typecheck, tests and shellcheck on every push / PR. The documented install pulls straight
# from main and runs it, so a build- or shell-breaking commit must be caught BEFORE it reaches an installer.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install deps (reproducible)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: |
          sudo apt-get update -y && sudo apt-get install -y shellcheck
          # warning+ fails the gate; info/style nits in the existing scripts are not blocking.
          shellcheck --severity=warning bootstrap.sh scripts/*.sh
